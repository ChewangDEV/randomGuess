<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guessing Number</title>
    <link rel="stylesheet" href="./style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Allura&family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Exo+2:ital,wght@0,100..900;1,100..900&family=Libertinus+Math&family=Mozilla+Headline:wght@200..700&family=Orbitron:wght@400..900&family=Pacifico&family=Playwrite+AU+QLD:wght@100..400&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <h1 id="head">Guess the Number</h1>
        <p class="computerGuess"></p>
        <h2 class="result"></h2>
        <p class="attempt"></p>
        <p class="live">Life: 7</p>
        <input type="text" placeholder="Enter your number">
        <button class="start">Start</button>
        <div class="button">
            <button class="submit">Submit</button>
            <button class="play">Play Again</button>
        </div>
    </div>

    <script src="./index.js"></script>
</body>

</html>
